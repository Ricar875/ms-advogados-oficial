<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento | MS Advogados Associados</title>
    <!-- Fonte Inter (Padrão de interfaces modernas) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f3d2e; /* Verde Escuro Institucional */
            --accent: #d4af37;  /* Dourado Premium */
            --whatsapp: #25D366;
            --dark-bg: #0a1f18;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            /* Fundo abstrato moderno */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(15, 61, 46, 0.8) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        /* Container Principal com efeito Glassmorphism */
        .agency-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Detalhe dourado no topo */
        .agency-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(37, 211, 102, 0.15);
            color: #4ade80;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid rgba(37, 211, 102, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Botão Premium */
        .btn-premium {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--whatsapp);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px -10px rgba(37, 211, 102, 0.5);
            position: relative;
            overflow: hidden;
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -10px rgba(37, 211, 102, 0.7);
            background: #20bd5a;
        }

        .btn-premium i { font-size: 1.4rem; }

        /* Lista de Canais Alternativos */
        .channels {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .channel-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .channel-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .channel-item i { font-size: 1.2rem; color: var(--accent); }
        .channel-item span { font-size: 0.85rem; font-weight: 500; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .agency-card { padding: 30px 20px; }
            h1 { font-size: 1.6rem; }
            .channels { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="agency-card">
        <!-- Status Online -->
        <div class="status-badge">
            <div class="status-dot"></div>
            Atendimento Online Agora
        </div>

        <h1>Como podemos ajudar?</h1>
        <p class="description">
            Nossa equipe de especialistas está pronta para analisar seu caso com a prioridade que ele merece. Escolha o canal abaixo.
        </p>

        <!-- Botão Principal -->
        <a href="https://wa.me/5575991250929?text=Olá,%20gostaria%20de%20iniciar%20meu%20atendimento." class="btn-premium" target="_blank">
            <i class="fab fa-whatsapp"></i>
            Falar com Especialista
        </a>

        <!-- Canais Secundários (Estilo Agência) -->
        <div class="channels">
            <a href="tel:+557532819742" class="channel-item">
                <i class="fas fa-phone-alt"></i>
                <span>Ligar Agora</span>
            </a>
            <a href="mailto:contato@msadvogadospa.com.br" class="channel-item">
                <i class="far fa-envelope"></i>
                <span>Enviar E-mail</span>
            </a>
        </div>
    </div
